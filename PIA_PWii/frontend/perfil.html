<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | Hogaranza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-amarillo-pastel d-flex align-items-center" style="min-height: 100vh;">

    <div class="position-absolute top-0 start-0 p-4 w-100 d-flex justify-content-between align-items-center">
        <a class="text-decoration-none d-flex align-items-center text-primary" href="index.html">
            <span class="fs-3 me-2">(｡ᴖ ⤙ ᴖ)𐂐◯𓇋</span>
            <h2 class="fw-bold mb-0 d-none d-sm-block">Hogaranza</h2>
        </a>
        <button id="cerrarSesion()" class="btn btn-outline-danger rounded-pill fw-bold">Cerrar Sesión</button>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4 text-center p-4">

                    <img id="avatarPerfil"
                        src="https://ui-avatars.com/api/?name=Usuario&background=1a4d8c&color=fff&rounded=true&size=100"
                        alt="Avatar" class="mx-auto mt-3 mb-3 shadow-sm rounded-circle" style="width: 100px;">

                    <h3 class="text-primary fw-bold mb-4" id="tituloNombre">Mi Perfil</h3>

                    <div class="card-body text-start">
                        <form id="formPerfil">
                            <div class="mb-3">
                                <label for="editNombre" class="form-label text-secondary fw-bold small">Nombre
                                    Completo</label>
                                <input type="text" class="form-control border-primary shadow-sm" id="editNombre"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="editEmail" class="form-label text-secondary fw-bold small">Correo
                                    Electrónico</label>
                                <input type="email" class="form-control border-primary shadow-sm" id="editEmail"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="editPais" class="form-label text-secondary fw-bold small">País de
                                    Origen</label>
                                <select id="editPais" class="form-select border-primary shadow-sm" required>
                                    <option value="1">México</option>
                                    <option value="2">Colombia</option>
                                    <option value="3">Argentina</option>
                                    <option value="4">España</option>
                                    <option value="5">Perú</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="editPassword" class="form-label text-secondary fw-bold small">Nueva
                                    Contraseña <span class="text-muted fw-normal">(Opcional, déjalo en blanco para
                                        mantener la actual)</span></label>
                                <input type="password" class="form-control border-primary shadow-sm" id="editPassword">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 shadow-sm rounded-pill fw-bold py-2">
                                Guardar Cambios
                            </button>
                            <div id="mensajePerfil" class="text-center mt-3 small fw-bold"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/main.js?v=2"></script>
</body>

</html>
