<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hogaranza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <script src="https://kit.fontawesome.com/bf93395039.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calificar.css">
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0" style="height: 100vh;">

            <div class="col-md-3 p-4 d-flex flex-column shadow bg-amarillo-pastel" style="z-index: 10;">

                <a class="text-decoration-none d-flex align-items-center mb-4 text-primary" href="#">
                    <span class="fs-3 me-2">(｡ᴖ ⤙ ᴖ)𐂐◯𓇋</span>
                    <h2 class="fw-bold mb-0">Hogaranza </h2>
                </a>

                <div class="flex-grow-1">
                    <label class="form-label small fw-bold text-primary">Elige el país:</label>
                    <select id="nacionalidad" class="form-select mb-4 border-primary  rounded-3">
                    </select>

                    <label class="form-label small fw-bold text-primary">Preferencia de Sabor</label>
                    <label class="form-label small fw-bold text-primary mt-3">Categorías de Comida</label>
                    <div class="bg-amarillo-pastel p-3 rounded-3 border mb-3 ">

                        <div id="contenedor-categorias" style="max-height: 150px; overflow-y: auto;">
                            <span class="text-muted small">Cargando categorías...</span>
                        </div>

                        <hr class="my-2">

                        <div class="input-group input-group-sm">
                            <input type="text" id="nuevaCategoriaInput" class="form-control"
                                placeholder="Ej. Vegano, Postres...">
                            <button class="btn btn-outline-primary" type="button"
                                onclick="agregarNuevaCategoria()">+</button>
                        </div>
                        <div id="msgCategoria" class="small mt-1 text-center"></div>

                    </div>

                    <button class="btn btn-primary w-100 py-2  rounded-pill fw-bold" onclick="buscarPuentes()">
                        Ver Restaurantes Cercanos
                    </button>
                </div>
            </div>

            <div class="col-md-9 position-relative p-0">

                <div
                    class="position-absolute top-0 start-50 translate-middle-x mt-4 z-3 w-50 bg-celeste rounded-pill shadow p-2 d-flex align-items-center">
                    <form class="d-flex w-100 align-items-center m-0"
                        onsubmit="event.preventDefault(); buscarPuentes();">
                        <span class="ms-3 me-2 fs-5">🔍︎</span>
                        <input type="search" id="site-search"
                            class="form-control border-0 bg-transparent input-busqueda"
                            placeholder="¿Qué vamos a comer? 𓌉ς(•𐃷•)っ𓇋" />
                        <button type="button" onclick="buscarPuentes()"
                            class="btn btn-primary rounded-pill px-4">Buscar</button> 
                       <button type="button" onclick="limpiarFiltros()"
                            class="btn btn-primary rounded-pill px-3 ms-2"
                             title="Borrar filtros">⦸</button>
                    </form>
                </div>

                <div
                    class="position-absolute top-0 end-0 mt-4 me-4 z-3 bg-celeste rounded-pill shadow p-1 d-flex align-items-center cursor-pointer">
                    <a href="login.html" id="enlacePerfil" class="text-decoration-none d-flex align-items-center">
                        <img id="imgPerfil"
                            src="https://ui-avatars.com/api/?name=Invitado&background=1a4d8c&color=fff&rounded=true"
                            alt="Perfil" width="45" height="45" class="rounded-circle">
                        <div class="ms-2 me-3 d-none d-md-block text-dark">
                            <span id="nombrePerfil" class="fw-bold d-block lh-1 mt-1">Iniciar Sesión</span>
                            <span id="textoSecundarioPerfil" class="small text-muted d-block mt-1"
                                style="font-size: 0.8rem;">
                                Únete a Hogaranza
                            </span>
                        </div>
                    </a>
                </div>

                <div id="map" style="width: 100%; height: 100%; background-color: #e5e5e5;"></div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="restauranteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div style="height: 150px; background-color: #1a4d8c; border-radius: 1rem 1rem 0 0;"
                    class="position-relative d-flex justify-content-between p-3">

                    <button type="button" class="btn-close btn-close-white align-self-start" data-bs-dismiss="modal"
                        aria-label="Close"></button>

                    <button id="btnFavorito"
                        class="btn btn-light rounded-circle  d-flex align-items-center justify-content-center align-self-start"
                        style="width: 40px; height: 40px; border: none; background: rgba(255, 255, 255, 0.8);">
                        <span class="fs-4" id="iconoCorazon">♡</span>
                    </button>

                    <span id="modal-rating"
                        class="badge bg-warning text-dark position-absolute bottom-0 start-0 m-3 shadow"></span>
                </div>

                <div class="modal-body p-4 bg-amarillo-pastel">
                    <h4 id="modal-nombre" class="fw-bold text-primary mb-1">Cargando...</h4>

                    <h6 class="fw-bold mt-3">Platillos Destacados:</h6>
                    <ul id="modal-lista-platillos" class="list-group list-group-flush mb-3 rounded-3 ">
                    </ul>

                    <button class="btn btn-success w-100 rounded-pill mb-2 fw-bold" id="btnAbrirAgregarPlatillo">
                        + Añadir Platillo al Menú
                    </button>
                    <button class="btn btn-outline-primary w-100 rounded-pill"
                        id="btnAbrirAgregarResena">Calificar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="agregarRestauranteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header bg-primary text-white" style="border-radius: 1rem 1rem 0 0;">
                    <h5 class="modal-title fw-bold">📍 Agregar Restaurante</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <form id="formAgregarRestaurante">
                    <div class="modal-body p-4 bg-amarillo-pastel">
                        <p class="small text-muted mb-3 text-center">
                            Coordenadas: <span id="coordDisplay" class="fw-bold text-dark"></span>
                        </p>
                        <input type="hidden" id="addLat">
                        <input type="hidden" id="addLng">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-primary">Nombre del Restaurante</label>
                            <input type="text" class="form-control rounded-pill border-primary" id="addNombre" required
                                placeholder="Ej. Tacos El Rey">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-primary">Sede</label>
                            <select class="form-select rounded-pill border-primary" id="addSede" required>
                                <option value="1">CDMX</option>
                                <option value="2">Nuevo León</option>
                                <option value="3">Jalisco</option>
                            </select>
                        </div>
                        <div id="addMensaje" class="text-center mt-2"></div>
                    </div>
                    <div class="modal-footer border-0 bg-amarillo-pastel" style="border-radius: 0 0 1rem 1rem;">
                        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold ">Guardar
                            Restaurante</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="agregarPlatilloModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header bg-success text-white" style="border-radius: 1rem 1rem 0 0;">
                    <h5 class="modal-title fw-bold">🍽️Añadir Platillo al Menú</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <form id="formAgregarPlatillo">
                    <div class="modal-body p-4 bg-amarillo-pastel">
                        <input type="hidden" id="platilloRestauranteId">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-success">Nombre del Platillo</label>
                            <input type="text" class="form-control rounded-pill border-success" id="platilloNombre"
                                required placeholder="Ej. Pizza Margarita">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-success">Descripción</label>
                            <textarea class="form-control rounded-4 border-success" id="platilloDesc" rows="2"
                                placeholder="Ingredientes principales..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-success">Categoría del Platillo</label>
                            <select class="form-select rounded-pill border-success" id="platilloCategoria" required>
                                <option value="" selected disabled>Cargando categorías...</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold text-success">Precio ($)</label>
                                <input type="number" step="0.01" class="form-control rounded-pill border-success"
                                    id="platilloPrecio" required placeholder="0.00">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold text-success">País de Origen</label>
                                <select class="form-select rounded-pill border-success" id="platilloPais"
                                    required></select>
                            </div>
                        </div>

                        <div id="msgPlatillo" class="text-center mt-2"></div>
                    </div>
                    <div class="modal-footer border-0 bg-amarillo-pastel" style="border-radius: 0 0 1rem 1rem;">
                        <button type="button" class="btn btn-secondary rounded-pill fw-bold "
                            data-bs-target="#restauranteModal" data-bs-toggle="modal">Volver</button>
                        <button type="submit" class="btn btn-success rounded-pill fw-bold  px-4">Guardar
                            Platillo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="agregarResenaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header bg-warning text-dark" style="border-radius: 1rem 1rem 0 0;">
                    <h5 class="modal-title fw-bold"> ★ Dejar una Reseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="formAgregarResena">
                    <div class="modal-body p-4 bg-amarillo-pastel">
                        <input type="hidden" id="resenaRestauranteId">

                        <div class="mb-4 text-center pb-3"> <label
                                class="form-label small fw-bold text-dark d-block">Calificación</label>
                            <div class="calificar">
                                <input type="radio" id="estrella5" name="rating" value="5" required>
                                <label for="estrella5"></label>

                                <input type="radio" id="estrella4" name="rating" value="4">
                                <label for="estrella4"></label>

                                <input type="radio" id="estrella3" name="rating" value="3">
                                <label for="estrella3"></label>

                                <input type="radio" id="estrella2" name="rating" value="2">
                                <label for="estrella2"></label>

                                <input type="radio" id="estrella1" name="rating" value="1">
                                <label for="estrella1"></label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-dark">Tu Comentario</label>
                            <textarea class="form-control rounded-4 border-warning" id="resenaComentario" rows="3"
                                placeholder="¿Qué te pareció la comida y el lugar?..." required></textarea>
                        </div>

                        <div id="msgResena" class="text-center mt-2"></div>
                    </div>
                    <div class="modal-footer border-0 bg-amarillo-pastel" style="border-radius: 0 0 1rem 1rem;">
                        <button type="button" class="btn btn-secondary rounded-pill fw-bold"
                            data-bs-target="#restauranteModal" data-bs-toggle="modal">Volver</button>
                        <button type="submit" class="btn btn-warning rounded-pill fw-bold px-4">Publicar Reseña</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="./js/main.js?v=2"></script>

</body>

</html>
