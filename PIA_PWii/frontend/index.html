<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hogaranza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="css/styles.css">
    <style>

    </style>
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0" style="height: 100vh;">

            <div class="col-md-3 p-4 d-flex flex-column shadow bg-amarillo-pastel" style="z-index: 10;">

                <a class="text-decoration-none d-flex align-items-center mb-4 text-primary" href="#">
                    <span class="fs-3 me-2">(｡ᴖ ⤙ ᴖ)𐂐◯𓇋</span>
                    <h2 class="fw-bold mb-0">Hogaranza </h2>
                </a>


                <div class="flex-grow-1">
                    <label class="form-label small fw-bold text-primary">Elige el país:</label>
                    <select id="nacionalidad" class="form-select mb-4 border-primary shadow-sm rounded-3">
                    </select>

                    <label class="form-label small fw-bold text-primary">Preferencia de Sabor</label>
                    <div class="bg-amarillo-pastel p-3 rounded-3 border mb-4 shadow-sm">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="picoso">
                            <label class="form-check-label text-secondary">Picoso</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="vegetariano">
                            <label class="form-check-label text-secondary">Vegetariano</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="dulce">
                            <label class="form-check-label text-secondary">Dulce</label>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2 shadow-sm rounded-pill fw-bold" onclick="buscarPuentes()">
                        Ver Restaurantes Cercanos
                    </button>
                </div>
            </div>

            <div class="col-md-9 position-relative p-0">

                <div
                    class="position-absolute top-0 start-50 translate-middle-x mt-4 z-3 w-50 bg-celeste rounded-pill shadow p-2 d-flex align-items-center">
                    <form action="#" method="get" class="d-flex w-100 align-items-center m-0">
                        <span class="ms-3 me-2 fs-5">🔍︎</span>
                        <input type="search" id="site-search" name="q"
                            class="form-control border-0 bg-transparent input-busqueda"
                            placeholder="¿Qué vamos a comer? 𓌉ς(•𐃷•)っ𓇋" aria-label="Search" />
                        <button type="#" class="btn btn-primary rounded-pill px-4">Buscar</button>
                    </form>
                </div>

                <div
                    class="position-absolute top-0 end-0 mt-4 me-4 z-3 bg-celeste rounded-pill shadow p-1 d-flex align-items-center cursor-pointer">
                    <a href="perfil.html"> <img
                            src="https://ui-avatars.com/api/?name=roxanna&background=1a4d8c&color=fff&rounded=true"
                            alt="Perfil" width="45" height="45">
                        <div class="ms-2 me-3 d-none d-md-block">
                            <span class="fw-bold d-block lh-1 text-dark mt-1">roxanna</span>
                            <span class="small text-muted d-flex align-items-center mt-1" style="font-size: 0.8rem;">
                                <img src="https://flagsapi.com/MX/flat/16.png" alt="México" class="me-1">
                                México
                            </span>
                    </a>

                </div>
            </div>

            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="js/main.js"></script>

    <div class="modal fade" id="restauranteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div style="height: 150px; background-color: #1a4d8c; border-radius: 1rem 1rem 0 0;"
                    class="position-relative">
                    <span id="modal-rating"
                        class="badge bg-warning text-dark position-absolute bottom-0 start-0 m-3 shadow"></span>
                </div>
                <div class="modal-body p-4 bg-amarillo-pastel">
                    <h4 id="modal-nombre" class="fw-bold text-primary mb-1">tacos "el Pro" </h4> <img
                        src="https://flagsapi.com/MX/flat/24.png" class="me-2" alt="MX">

                    <p id="modal-ubicacion" class="text-muted small mb-3"> Ubicación</p>

                    <h6 class="fw-bold mt-3">Platillos Destacados:</h6>
                    <ul id="modal-lista-platillos" class="list-group list-group-flush mb-3 rounded-3 shadow-sm">
                    </ul>

                    <button class="btn btn-outline-primary w-100 rounded-pill">calificar</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
