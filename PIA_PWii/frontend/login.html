<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Hogaranza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-amarillo-pastel d-flex align-items-center" style="height: 100vh;">

    <div class="position-absolute top-0 start-0 p-4">
        <a class="text-decoration-none d-flex align-items-center text-primary" href="index.html">
            <span class="fs-3 me-2">(｡ᴖ ⤙ ᴖ)𐂐◯𓇋</span>
            <h2 class="fw-bold mb-0">Hogaranza</h2>
        </a>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <h2 class="text-primary fw-bold mb-1">¡Hola de nuevo!</h2>
                            <p class="text-muted small">Ingresa tus datos para continuar</p>
                        </div>
                        
                        <form id="formLogin">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label text-secondary fw-bold small">Correo Electrónico</label>
                                <input type="email" class="form-control border-primary  rounded-3" id="loginEmail" required>
                            </div>
                            <div class="mb-4">
                                <label for="loginPassword" class="form-label text-secondary fw-bold small">Contraseña</label>
                                <input type="password" class="form-control border-primary  rounded-3" id="loginPassword" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3  rounded-pill fw-bold py-2">
                                Entrar
                            </button>
                            
                            <div id="mensajeErrorLogin" class="text-danger text-center small fw-bold"></div>
                        </form>

                        <hr class="my-4 border-secondary">
                        <p class="text-center mb-0 text-muted">¿Eres nuevo en Hogaranza? <a href="registro.html" class="text-primary fw-bold text-decoration-none">Regístrate ahora</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <script src="./js/main.js?v=2"></script>
</body>
</html>
